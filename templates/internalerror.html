<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ store_name }}</title>
    <link rel="stylesheet" href="/css/style.css?v=999">
</head>
<body class="auth-wrapper">
    <div class="auth-card" style="text-align: center;">
        <div style="margin-bottom: 20px; color: #e74c3c;">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
            </svg>
        </div>

        <h2>Something went wrong</h2>
        <p>An unexpected error occurred. If you continue to receive this message, please notify us.</p>
        
        <div class="error-container" style="background: rgba(231, 76, 60, 0.1); border-radius: 8px; padding: 10px; margin: 20px 0;">
            <p style="color: #e74c3c; margin: 0; font-family: monospace;">Error 500: Internal Server Error</p>
        </div>

        <div class="auth-footer">
            <button onclick="window.location.reload()" class="submit-btn">
                Refresh Page
            </button>
            <a href="/" class="secondary-link" style="display: block; margin-top: 15px; text-decoration: none; font-size: 0.9em; color: var(--text-muted);">
                ← Return to Store
            </a>
        </div>
    </div>
</body>
</html>
