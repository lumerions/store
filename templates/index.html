<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ store_name }}</title>
    <style>
        :root {
            --primary: #111111;
            --accent: #0070f3;
            --bg: #ffffff;
            --grey: #f4f4f4;
            --text-muted: #666666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--primary); }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem 5%; border-bottom: 1px solid #eee;
        }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; text-transform: uppercase; }

        .hero {
            padding: 80px 5%; text-align: center; background: var(--grey);
            margin-bottom: 40px;
        }
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; }
        .hero p { color: var(--text-muted); margin-bottom: 20px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 5%; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px; padding-bottom: 100px;
        }

        .card { border: 1px solid #eee; padding: 15px; border-radius: 8px; transition: 0.2s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .image-placeholder { 
            width: 100%; aspect-ratio: 1; background: #eee; 
            margin-bottom: 15px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center; color: #999;
        }
        .card h3 { font-size: 1.1rem; margin-bottom: 5px; }
        .card .desc { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 10px; }
        .card .price { font-weight: 700; color: var(--accent); }

        .btn {
            background: var(--primary); color: white; padding: 10px 20px;
            text-decoration: none; border-radius: 5px; font-weight: 500;
        }
        @media (max-width: 600px) { .hero h1 { font-size: 2rem; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">{{ store_name }}</div>
        <div>
            <a href="/docs" style="text-decoration: none; color: inherit; font-size: 0.9rem;">Admin API</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Welcome to {{ store_name }}</h1>
        <p>Quality goods, delivered to your door.</p>
        <a href="#shop" class="btn">Browse All</a>
    </header>

    <div class="container" id="shop">
        <div class="grid">
            {% for item in products %}
            <div class="card">
                <div class="image-placeholder">Image</div>
                <h3>{{ item.name }}</h3>
                <p class="desc">{{ item.desc }}</p>
                <p class="price">{{ item.price }}</p>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
