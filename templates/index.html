<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ store_name }} | Shop</title>
    <style>
        :root {
            --primary: #111111;
            --accent: #0070f3;
            --bg: #ffffff;
            --grey: #f4f4f4;
            --text-muted: #666666;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--primary); overflow-x: hidden; }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem 5%; border-bottom: 1px solid #eee;
            position: sticky; top: 0; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); z-index: 100;
        }
        .logo { font-weight: 800; font-size: 1.2rem; text-decoration: none; color: var(--primary); text-transform: uppercase; }
        .cart-link { cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        #cart-count { background: var(--accent); color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; }

        .hero { padding: 80px 5%; text-align: center; background: var(--grey); margin-bottom: 40px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; padding-bottom: 100px; }
        .card { border: 1px solid #eee; padding: 20px; border-radius: 12px; display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .image-placeholder { width: 100%; aspect-ratio: 1; background: #eee; margin-bottom: 15px; border-radius: 8px; }
        .add-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }

        #cart-overlay, #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 1000;
        }
        #cart-panel {
            position: fixed; top: 0; right: -400px; width: 100%; max-width: 400px; height: 100%;
            background: white; z-index: 1001; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.1);
        }
        #cart-panel.open { right: 0; }
        .cart-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        #cart-items { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #f9f9f9; }
        .remove-btn { color: #ff4d4d; font-size: 0.75rem; cursor: pointer; border: none; background: none; margin-top: 5px; }
        .cart-footer { padding: 20px; border-top: 1px solid #eee; }
        .checkout-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }

        #checkout-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 450px; background: white; z-index: 2001;
            padding: 30px; border-radius: 16px; display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .payment-method {
            display: flex; align-items: center; gap: 15px; padding: 15px;
            border: 2px solid #eee; border-radius: 10px; cursor: pointer;
            margin-top: 12px; transition: 0.2s; font-weight: 600;
        }
        .payment-method:hover { border-color: var(--accent); background: #f0f7ff; }
        .payment-method svg { width: 28px; height: 28px; }
        .close-x { cursor: pointer; font-size: 1.5rem; border: none; background: none; }
    </style>
</head>
<body>

    <div id="cart-overlay" onclick="toggleCart()"></div>
    <div id="modal-overlay" onclick="closeCheckout()"></div>

    <div id="cart-panel">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="close-x" onclick="toggleCart()">&times;</button>
        </div>
        <div id="cart-items"></div>
        <div class="cart-footer">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                <strong>Total:</strong>
                <strong id="cart-total">$0.00</strong>
            </div>
            <button class="checkout-btn" onclick="openCheckout()">Go to Checkout</button>
        </div>
    </div>

    <div id="checkout-modal">
        <div class="modal-header">
            <h3>Checkout</h3>
            <button class="close-x" onclick="closeCheckout()">&times;</button>
        </div>
        <p style="margin-bottom: 10px;">Total Due: <span id="modal-total-display" style="font-weight: 800; color: var(--accent);"></span></p>
        
        <div class="payment-method" onclick="processPayment('Credit Card')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
            Pay with Card
        </div>

    <div class="payment-method" onclick="processPayment('Solana')">
        <img src="/public/solana.png" 
            alt="Solana Logo" 
            style="width: 28px; height: 28px; object-fit: contain;">
        Pay with Solana
    </div>
    </div>

    <nav>
        <a href="/" class="logo">{{ store_name }}</a>
        <div class="cart-link" onclick="toggleCart()">
            Cart <span id="cart-count">0</span>
        </div>
    </nav>

    <header class="hero">
        <h1>Welcome to {{ store_name }}</h1>
        <p>Premium items stored in your local browser.</p>
    </header>

    <div class="container">
        <div class="grid">
            {% for item in products %}
            <div class="card">
                <div class="image-placeholder"></div>
                <h3>{{ item.name }}</h3>
                <p class="price" style="font-weight: 700; color: var(--accent);">{{ item.price }}</p>
                <p style="font-size: 0.85rem; color: #888; margin-bottom: 15px;">{{ item.desc }}</p>
                <button class="add-btn" onclick="addToCart('{{ item.name }}', '{{ item.price }}')">Add to Cart</button>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="/javascript/index.js"></script>
</body>
</html>
