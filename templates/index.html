<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | {{ store_name }}</title>
    <link rel="stylesheet" href="/css/style.css?v=999">
</head>
<body>

    <nav>
        <a href="/" class="logo">{{ store_name }}</a>
        <div class="nav-right">
            <a href="/" class="login-btn">View Store</a>
            <button type="button" id="logout-btn" class="login-btn">
                Logout
            </button>
        </div>
    </nav>

    <header class="hero" style="padding: 40px 20px;">
        <h1>Inventory Control</h1>
        <p>Manage your premium curated items and security.</p>
    </header>

    <div class="container">
        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));">
            
            <div class="card" style="text-align: left;">
                <h3 style="border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px;">Add New Product</h3>
                <form id="add-item-form">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;">Item Name</label>
                        <input type="text" id="itemName" style="width:100%; padding:10px; border: 1px solid #ddd; border-radius: 5px;" placeholder="e.g. Premium Hoodie" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;">Price</label>
                        <input type="text" id="itemPrice" style="width:100%; padding:10px; border: 1px solid #ddd; border-radius: 5px;" placeholder="e.g. 59.99" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;">Image URL</label>
                        <input type="url" id="itemImage" style="width:100%; padding:10px; border: 1px solid #ddd; border-radius: 5px;" placeholder="https://..." required>
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;">Description</label>
                        <textarea id="itemDesc" style="width:100%; padding:10px; border: 1px solid #ddd; border-radius: 5px; height: 80px;" placeholder="Describe the item..." required></textarea>
                    </div>
                    <button type="submit" class="add-btn" id="submitBtn" style="width: 100%;">Add Item to Store</button>
                </form>
            </div>

            <div class="card" style="text-align: left; border-top: 4px solid var(--accent);">
                <h3 style="border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px;">Edit Existing Product</h3>
                <form id="edit-item-form">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;">Target Item Name</label>
                        <input type="text" id="editItemName" style="width:100%; padding:10px; border: 1px solid #ddd; border-radius: 5px; background: #f9f9f9;" placeholder="Exact name in DB" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;">New Price</label>
                        <input type="text" id="editItemPrice" style="width:100%; padding:10px; border: 1px solid #ddd; border-radius: 5px;">
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;">New Image URL</label>
                        <input type="url" id="editItemImage" style="width:100%; padding:10px; border: 1px solid #ddd; border-radius: 5px;">
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;">New Description</label>
                        <textarea id="editItemDesc" style="width:100%; padding:10px; border: 1px solid #ddd; border-radius: 5px; height: 80px;"></textarea>
                    </div>
                    <button type="submit" class="add-btn" id="editSubmitBtn" style="width: 100%; background: #333;">Save Changes</button>
                </form>
            </div>

            <div class="card" style="text-align: left;">
                <h3 style="border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px;">User Security</h3>
                <form id="lock-account-form">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;">Target Username</label>
                        <input type="text" id="lockUsername" style="width:100%; padding:10px; border: 1px solid #ddd; border-radius: 5px;" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;">Action</label>
                        <select id="lockAction" style="width:100%; padding:10px; border: 1px solid #ddd; border-radius: 5px; background: white;">
                            <option value="lock">Lock Account</option>
                            <option value="unlock">Unlock Account</option>
                        </select>
                    </div>
                    <button type="submit" class="add-btn" id="lockSubmitBtn" style="width: 100%; background: var(--accent);">Update User Status</button>
                </form>
            </div>

        </div>
    </div>

    <div id="notification-toast" class="toast-left" style="display: none;"></div>
</body>
</html>
