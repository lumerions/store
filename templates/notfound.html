<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ store_name }}</title>
    <link rel="stylesheet" href="/css/style.css?v=999">
</head>
<body class="auth-wrapper"> 
    <div class="auth-card" style="text-align: center;">
        <div style="margin-bottom: 20px; color: var(--accent);">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
        </div>

        <h2 style="font-size: 2rem; margin-bottom: 10px;">Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        
        <div class="error-container" style="display: inline-block; width: auto; padding: 5px 15px; margin-top: 10px;">
            Error Code: 404
        </div>

        <div class="auth-footer" style="margin-top: 30px;">
            <a href="/" class="submit-btn" style="text-decoration: none; display: block; text-align: center;">
                Back to Store
            </a>
            <a href="javascript:history.back()" class="secondary-link">← Go Back</a>
        </div>
    </div>
</body>
</html>
