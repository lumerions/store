<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | {{ store_name }}</title>
    <link rel="stylesheet" href="/css/style.css?v=999">
</head>
<body class="auth-wrapper"> <div class="auth-card">
        <h2>Create Account</h2>
        <p>Join {{ store_name }} to track your orders.</p>
        
        <form action="/signup" method="post">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="submit-btn">Create Account</button>
        </form>
        
        <div class="auth-footer">
            <a href="/login" class="secondary-link">Already have an account? Log In</a>
            <a href="/" class="secondary-link">← Back to Store</a>
        </div>
    </div>
</body>
</html>
