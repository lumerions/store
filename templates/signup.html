<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | {{ store_name }}</title>
    <link rel="stylesheet" href="/css/style.css?v=999">
    <style>
        /* Professional Separator */
        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #888;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .separator::before,
        .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #eee;
        }

        .separator:not(:empty)::before { margin-right: .8em; }
        .separator:not(:empty)::after { margin-left: .8em; }

        .otp-link-wrapper {
            text-align: center;
            margin-bottom: 5px;
        }

        .otp-link-wrapper .secondary-link {
            font-weight: 600;
            color: #444;
            text-decoration: none;
        }

        .otp-link-wrapper .secondary-link:hover {
            text-decoration: underline;
            color: #000;
        }
    </style>
</head>

<body class="auth-wrapper"> 
    <div class="auth-card">
        <h2>Create Account</h2>
        <p>Join {{ store_name }} to track your orders.</p>

        <div id="error-box" class="error-container" style="display: none;">
            <p id="error-message"></p>
        </div>
        
        <form id="signupForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="johndoe123" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@company.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn">Create Account</button>

            <div class="separator">or</div>

            <div class="otp-link-wrapper">
                <a href="/send-otp" class="secondary-link">Quick Sign Up with Email Code</a>
            </div>
        </form>
        
        <div class="auth-footer">
            <a href="/login" class="secondary-link">Already have an account? Log In</a>
            <a href="/" class="secondary-link">← Back to Store</a>
        </div>
    </div>
    
    <script type="module" src="/javascript/signup.js"></script>
</body>
</html>
