<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | {{ store_name }}</title>
    <link rel="stylesheet" href="/css/style.css?v=999">
</head>

<body class="auth-wrapper"> 
    <div class="auth-card">
        <h2>Create Account</h2>
        <p>Join {{ store_name }} to track your orders.</p>

        <div id="error-box" class="error-container" style="display: none;">
            <p id="error-message"></p>
        </div>
        
        <form id="signupForm" action="/signup" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="johndoe123" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@company.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="submit-btn">Create Account</button>
        </form>
        
        <div class="auth-footer">
            <a href="/login" class="secondary-link">Already have an account? Log In</a>
            <a href="/" class="secondary-link">← Back to Store</a>
        </div>
    </div>
</body>
</html>
