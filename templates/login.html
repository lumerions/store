<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to {{ store_name }}</title>
    <link rel="stylesheet" href="/css/style.css?v=999">
    <style>
        /* Modern Separator Line */
        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #888;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .separator::before,
        .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #eee;
        }

        .separator:not(:empty)::before { margin-right: .5em; }
        .separator:not(:empty)::after { margin-left: .5em; }

        .otp-link-wrapper {
            text-align: center;
            margin-bottom: 10px;
        }

        .otp-link-wrapper .secondary-link {
            font-weight: 500;
            color: #555;
            transition: color 0.2s;
        }

        .otp-link-wrapper .secondary-link:hover {
            color: #000;
        }
    </style>
</head>
<body class="auth-wrapper">

    <div class="auth-card">
        <h2>Welcome back</h2>
        <p>Enter your details to access your account.</p>

        <div id="error-box" class="error-container" style="display: none;">
            <p id="error-message"></p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="johndoe123" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn">Log In</button>
            
            <div class="separator">or</div>

            <div class="otp-link-wrapper">
                <a href="/send-otp" class="secondary-link">Sign in with a one-time code</a>
            </div>
        </form>

        <div class="auth-footer">
            <a href="/signup" class="secondary-link">Don't have an account? Sign Up</a>
            <a href="/" class="secondary-link">← Back to Store</a>
        </div>
    </div>

    <script type="module" src="/javascript/login.js"></script>
</body>
</html>
