<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login in to {{ store_name }}</title>
    <link rel="stylesheet" href="/css/style.css?v=999">
</head>
<body class="auth-wrapper">
    <div class="auth-card">
        <h2>Welcome back</h2>
        <p>Enter your details to access your account.</p>

        <div id="error-box" class="error-container" style="display: none;">
            <p id="error-message"></p>
        </div>

        <form id="loginForm">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="johndoe123" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn">Log In</button>
        </form>
        
        <div class="auth-footer">
            <a href="/signup" class="secondary-link">Don't have an account? Sign Up</a>
            <a href="/" class="secondary-link">← Back to Store</a>
        </div>
    </div>
    <script type="module" src="/javascript/login.js"></script>
</body>
</html>
