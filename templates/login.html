<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | {{ store_name }}</title>
    <style>
        :root { --primary: #111111; --accent: #0070f3; --bg: #ffffff; --grey: #f4f4f4; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--grey); display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .login-card {
            background: white; padding: 40px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px;
        }
        h2 { margin-bottom: 8px; font-weight: 800; }
        p { color: #666; margin-bottom: 24px; font-size: 0.9rem; }
        
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        input {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 1rem; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); }
        
        .submit-btn {
            width: 100%; padding: 14px; background: var(--primary); color: white;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px;
        }

        .auth-footer {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .secondary-link {
            font-size: 0.85rem;
            color: var(--accent);
            text-decoration: none;
            transition: 0.2s;
        }
        
        .secondary-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Welcome back</h2>
        <p>Enter your details to access your account.</p>
        
        <form action="/login" method="post">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="submit-btn">Sign In</button>
        </form>
        
        <div class="auth-footer">
            <a href="/signup" class="secondary-link">Don't have an account? Sign Up</a>
            
            <a href="/" class="secondary-link">← Back to Store</a>
        </div>
    </div>
</body>
</html>
