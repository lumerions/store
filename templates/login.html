<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to {{ store_name }}</title>
    <link rel="stylesheet" href="/css/style.css?v=999">
</head>
<body class="auth-wrapper">

    <div class="auth-card">
        <h2>Welcome back</h2>
        <p>Enter your details to access your account.</p>

        <div id="error-box" class="error-container" style="display: none;">
            <p id="error-message"></p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="johndoe123" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn">Log In</button>

            <div id="otp-section" class="otp-container">
                <div class="form-group">
                    <label for="otp-code">One-Time Code</label>
                    <input type="text" 
                           id="otp-code" 
                           name="otp_code" 
                           placeholder="000000" 
                           inputmode="numeric" 
                           pattern="[0-9]*" 
                           autocomplete="one-time-code">
                    <p style="font-size: 0.8rem; color: #666; margin-top: 8px;">
                        Please enter the 6-digit verification code sent to your device.
                    </p>
                </div>
                
                <button type="button" id="verify-btn" class="submit-btn" style="background-color: #28a745;">
                    Verify & Sign In
                </button>
                
                <button type="button" id="resend-btn" class="resend-link">
                    Didn't get a code? Resend
                </button>
            </div>
        </form>

        <div class="auth-footer">
            <a href="/signup" class="secondary-link">Don't have an account? Sign Up</a>
            <a href="/" class="secondary-link">← Back to Store</a>
        </div>
    </div>

    <script type="module" src="/javascript/login.js"></script>
    
</body>
</html>
