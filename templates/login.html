<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Account - {{ store_name }}</title>
    <link rel="stylesheet" href="/css/style.css?v=999">
</head>
<body class="auth-wrapper">
    <div class="auth-card">
        <h2>Verify Your Account</h2>
        <p>Enter the one-time code sent to your email.</p>

        <div id="otp-error-box" class="error-container" style="display: none;">
            <p id="otp-error-message"></p>
        </div>

        <form id="otpForm">

            <div class="form-group">
                <label for="otp">One-Time Code</label>
                <input type="text" id="otp" name="otp" placeholder="Enter code" required maxlength="6">
            </div>

            <button type="submit" id="verify-btn" class="submit-btn">Verify</button>
        </form>
        
        <div class="auth-footer">
            <a href="/login" class="secondary-link">← Back to Login</a>
            <a href="#" id="resend-code" class="secondary-link">Resend Code</a>
        </div>
    </div>

    <script type="module" src="/javascript/otp.js"></script>
</body>
</html>
