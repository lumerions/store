<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to {{ store_name }}</title>
    <link rel="stylesheet" href="/css/style.css?v=999">
    <style>
        .divider {
            border: 0;
            border-top: 2px solid #d1d5db; 
            margin: 25px 0;
        }

        .otp-link-wrapper {
            text-align: center;
            margin-bottom: 5px;
        }

        .otp-pill-link {
            display: inline-block;
            padding: 10px 20px;
            border: 1.5px solid #d1d5db;
            border-radius: 50px; 
            text-decoration: none;
            color: #374151;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .otp-pill-link:hover {
            background-color: #f9fafb;
            border-color: #9ca3af;
            color: #000;
        }
    </style>
</head>
<body class="auth-wrapper">
    <div class="auth-card">
        <h2>Welcome back</h2>
        <p>Enter your details to access your account.</p>

        <div id="error-box" class="error-container" style="display: none;">
            <p id="error-message"></p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="johndoe123" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn">Log In</button>
            
            <hr class="divider">

            <div class="otp-link-wrapper">
                <a href="/send-otp" class="otp-pill-link">Sign in with a one-time code</a>
            </div>
        </form>

        <div class="auth-footer">
            <a href="/signup" class="secondary-link">Don't have an account? Sign Up</a>
            <a href="/" class="secondary-link">← Back to Store</a>
        </div>
    </div>
    <script type="module" src="/javascript/login.js"></script>
</body>
</html>
