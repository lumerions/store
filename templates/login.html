<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login in to {{ store_name }}</title>
    <link rel="stylesheet" href="/css/style.css?v=999">
    <style>
        /* OTP input styling */
        #otp-container {
            display: none; /* Hidden by default */
            margin-top: 15px;
        }

        #otp-container input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        #otp-container .submit-btn {
            width: 100%;
        }

        .error-container {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body class="auth-wrapper">
    <div class="auth-card">
        <h2>Welcome back</h2>
        <p>Enter your details to access your account.</p>

        <div id="error-box" class="error-container" style="display: none;">
            <p id="error-message"></p>
        </div>

        <form id="loginForm">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="johndoe123" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn">Log In</button>

            <!-- OTP input appears here -->
            <div id="otp-container">
                <input type="text" id="otp" name="otp" placeholder="Enter One-Time Code" maxlength="6" required>
                <button type="submit" id="verify-btn" class="submit-btn">Verify OTP</button>
                <a href="#" id="resend-code" class="secondary-link" style="display:block; margin-top:5px;">Resend Code</a>
                <div id="otp-error-box" class="error-container" style="display:none;">
                    <p id="otp-error-message"></p>
                </div>
            </div>

        </form>
        
        <div class="auth-footer">
            <a href="/signup" class="secondary-link">Don't have an account? Sign Up</a>
            <a href="/" class="secondary-link">← Back to Store</a>
        </div>
    </div>

    <script type="module">
        const loginForm = document.getElementById('loginForm');
        const otpContainer = document.getElementById('otp-container');
        const otpInput = document.getElementById('otp');
        const otpErrorBox = document.getElementById('otp-error-box');
        const otpErrorMessage = document.getElementById('otp-error-message');
        const resendCode = document.getElementById('resend-code');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Only show OTP input after login submission
            if (otpContainer.style.display === 'none') {
                // Here, you would normally validate credentials via server
                console.log('Login submitted. Showing OTP input...');
                otpContainer.style.display = 'block';
                otpInput.focus();
            } else {
                // Submit OTP
                const otpValue = otpInput.value.trim();
                if (!otpValue) {
                    otpErrorBox.style.display = 'block';
                    otpErrorMessage.textContent = 'Please enter the OTP.';
                    return;
                }
                console.log('OTP submitted:', otpValue);
                // TODO: Send OTP to server for verification
                // On success, redirect or show success message
            }
        });

        resendCode.addEventListener('click', (e) => {
            e.preventDefault();
            console.log('Resend OTP requested');
            // TODO: Call server API to resend OTP
        });
    </script>
</body>
</html>
