{% extends "layout.html" %}
{% block title %}{{ store_name }}{% endblock %}
{% block content %}
    <div class="auth-wrapper"> 
        <div class="auth-card" style="text-align: center;">
            <div style="margin-bottom: 20px; color: var(--accent);">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
            </div>

            <h2>Too Many Requests</h2>
            <p>You're moving a bit too fast! Please wait a moment before trying again.</p>
            
            <div class="error-container">
                <p>Error 429: Rate limit exceeded.</p>
            </div>

            <div class="auth-footer">
                <button onclick="window.location.reload()" class="submit-btn">
                    Try Again
                </button>
                <a href="/" class="secondary-link">← Return to Store</a>
            </div>
        </div>
    </div>
{% endblock %}
