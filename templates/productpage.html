<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product.name }} | {{ store_name }}</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .product-page-container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        .product-image-section img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .product-info-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-onsale { background: #e6fcf5; color: #0ca678; }
        .status-offsale { background: #fff5f5; color: #fa5252; }

        .product-name { font-size: 2.5rem; margin: 0; color: #111; }
        .product-price { font-size: 1.5rem; font-weight: 600; color: #444; }
        .product-description { line-height: 1.6; color: #666; font-size: 1.05rem; }
        
        .meta-info {
            font-size: 0.85rem;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 20px;
            margin-top: 10px;
        }

        .add-to-cart-large {
            padding: 16px 32px;
            background: #000;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .add-to-cart-large:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .product-page-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">← Back to Store</a>
    </nav>

    <div class="product-page-container">
        <div class="product-image-section">
            <img src="{{ product.image }}" alt="{{ product.name }}">
        </div>

        <div class="product-info-section">
            <div>
                {% if product.offsale %}
                <span class="status-badge status-offsale">Offsale</span>
                {% else %}
                <span class="status-badge status-onsale">In Stock</span>
                {% endif %}
            </div>

            <h1 class="product-name">{{ product.name }}</h1>
            <p class="product-price">{{ product.price }}</p>
            
            <div class="product-description">
                {{ product.description }}
            </div>

            <button class="add-to-cart-large" 
                    {% if product.offsale %} disabled {% endif %}
                    onclick="addToCart('{{ product.name }}', '{{ product.price }}', '{{ product.image }}')">
                {% if product.offsale %} Currently Unavailable {% else %} Add to Cart {% endif %}
            </button>

            <div class="meta-info">
                <p>Item ID: {{ product.id }}</p>
                <p>Listed on: {{ product.created_at }}</p>
            </div>
        </div>
    </div>

    <script src="/javascript/index.js"></script>
</body>
</html>
