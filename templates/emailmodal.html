<div id="emailModal" class="modal-overlay">
    <div class="modal-content">
        <h3>Verify Your Email</h3>
        <p style="font-size:14px; color:#666;">Enter the verification code sent to your email.</p>
        <input type="text" id="verificationCode" placeholder="Enter code" inputmode="numeric" class="modal-input">
        <button id="verifyCodeBtn" class="submit-btn" style="width:100%;">Verify</button>
        <button id="closeModalBtn" class="cancel-btn">Cancel</button>
    </div>
</div>
