<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ store_name }}</title>
    <link rel="stylesheet" href="/css/style.css?v=999">
</head>
<body>

    <nav>
        <a href="/" class="logo">{{ store_name }}</a>
        <div class="nav-right">
            <a href="/" class="login-btn">View Store</a>
        </div>
    </nav>

    <header class="hero" style="padding: 40px 20px;">
        <h1>Admin Panel</h1>
        <p>Manage the website with administrator permissions.</p>
    </header>

    <div class="container">
        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px;">
            
            <div class="card" style="text-align: left; display: flex; flex-direction: column;">
                <div style="border-bottom: 2px solid var(--accent); margin-bottom: 20px;">
                    <h3 style="margin-bottom: 10px;">Add New Product</h3>
                </div>
                
                <form id="add-item-form" style="flex-grow: 1; display: flex; flex-direction: column;">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; color: #666;">Item Name</label>
                        <input type="text" id="itemName" style="width:100%; padding:12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem;" placeholder="e.g. Classic Hoodie" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; color: #666;">Price</label>
                        <input type="text" id="itemPrice" style="width:100%; padding:12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem;" placeholder="e.g. 59.99" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; color: #666;">Image URL</label>
                        <input type="url" id="itemImage" style="width:100%; padding:12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem;" placeholder="https://..." required>
                    </div>
                    <div class="form-group" style="margin-bottom: 25px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; color: #666;">Description</label>
                        <textarea id="itemDesc" style="width:100%; padding:12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; height: 100px; resize: none;" placeholder="Item details..." required></textarea>
                    </div>
                    <div class="form-group" style="margin-bottom: 25px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; color: #666;">New Offsale Status</label>
                        <textarea id="itemOffsale" style="width:100%; padding:12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; height: 100px; resize: none;" placeholder="Update offsale status TRUE or false" required></textarea>
                    </div>
                    <button type="submit" class="add-btn" id="submitBtn" style="width: 100%; margin-top: auto;">Create Product</button>
                </form>
            </div>

            <div class="card" style="text-align: left; display: flex; flex-direction: column;">
                <div style="border-bottom: 2px solid #333; margin-bottom: 20px;">
                    <h3 style="margin-bottom: 10px;">Edit Existing Product</h3>
                </div>
                
                <form id="edit-item-form" style="flex-grow: 1; display: flex; flex-direction: column;">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; color: #666;">Target Name (Search)</label>
                        <input type="text" id="editItemName" style="width:100%; padding:12px; border: 1px solid #333; border-radius: 8px; font-size: 1rem; background: #fdfdfd;" placeholder="Exact name of item to edit" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; color: #666;">New Price</label>
                        <input type="text" id="editItemPrice" style="width:100%; padding:12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem;" placeholder="$ ">
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; color: #666;">New Image URL</label>
                        <input type="url" id="editItemImage" style="width:100%; padding:12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem;" placeholder="https://...">
                    </div>
                    <div class="form-group" style="margin-bottom: 25px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; color: #666;">New Description</label>
                        <textarea id="editItemDesc" style="width:100%; padding:12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; height: 100px; resize: none;" placeholder="Update details..."></textarea>
                    </div>
                    <div class="form-group" style="margin-bottom: 25px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; color: #666;">New Offsale Status</label>
                        <textarea id="editItemOffsale" style="width:100%; padding:12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; height: 100px; resize: none;" placeholder="Update offsale status TRUE or false"></textarea>
                    </div>
                    <button type="submit" class="add-btn" id="editSubmitBtn" style="width: 100%; background: #333; margin-top: auto;">Update Details</button>
                </form>
            </div>

            <div class="card" style="text-align: left;">
                <div style="border-bottom: 2px solid var(--accent); margin-bottom: 20px;">
                    <h3 style="margin-bottom: 10px;">User Security</h3>
                </div>

                <form id="lock-account-form">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; color: #666;">Username</label>
                        <input type="text" id="lockUsername" style="width:100%; padding:12px; border: 1px solid #ddd; border-radius: 8px;" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display:block; font-size: 0.8rem; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; color: #666;">Action</label>
                        <select id="lockAction" style="width:100%; padding:12px; border: 1px solid #ddd; border-radius: 8px; background: white;">
                            <option value="lock">Lock Account</option>
                            <option value="unlock">Unlock Account</option>
                        </select>
                    </div>
                    <button type="submit" class="add-btn" id="lockSubmitBtn" style="width: 100%; background: var(--accent);">Apply Status</button>
                </form>
            </div>
            
            <div class="card" style="grid-column: 1 / -1; text-align: left; margin-top: 20px;">
            <div style="border-bottom: 2px solid var(--accent); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin-bottom: 10px;">Pending Orders</h3>
                <span id="order-count" style="background: var(--accent); color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold;">0 Pending</span>
            </div>

            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; min-width: 600px;">
                    <thead>
                        <tr style="text-align: left; border-bottom: 2px solid var(--grey);">
                            <th style="padding: 12px; font-size: 0.8rem; text-transform: uppercase; color: #666;">Order ID</th>
                            <th style="padding: 12px; font-size: 0.8rem; text-transform: uppercase; color: #666;">Customer</th>
                            <th style="padding: 12px; font-size: 0.8rem; text-transform: uppercase; color: #666;">Items</th>
                            <th style="padding: 12px; font-size: 0.8rem; text-transform: uppercase; color: #666;">Total</th>
                            <th style="padding: 12px; font-size: 0.8rem; text-transform: uppercase; color: #666;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table-body">
                        <tr>
                            <td colspan="5" style="padding: 40px; text-align: center; color: #999;">Loading orders...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        </div>
    </div>

    <div id="notification-toast" class="toast-left"></div>
    <script type="module" src="/javascript/admin.js"></script>
</body>
</html>
