<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | {{ store_name }}</title>
    <link rel="stylesheet" href="/css/style.css?v=999">
</head>
<body>

    <nav>
        <a href="/" class="logo">Admin: {{ store_name }}</a>
        <div class="nav-right">
            <a href="/" class="login-btn">View Store</a>
            <button type="button" id="logout-btn" class="login-btn">Logout</button>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h2>Inventory Management</h2>
            <span class="price">Admin Mode</span>
        </div>

        <div class="admin-card">
            <h3 style="margin-bottom: 20px;">Add New Product</h3>
            <form id="add-item-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Item Name</label>
                        <input type="text" id="itemName" placeholder="e.g. Premium Hoodie" required>
                    </div>
                    <div class="form-group">
                        <label>Price</label>
                        <input type="text" id="itemPrice" placeholder="e.g. $59.99" required>
                    </div>
                    <div class="form-group full-width">
                        <label>Image URL</label>
                        <input type="url" id="itemImage" placeholder="https://example.com/image.jpg" required>
                    </div>
                    <div class="form-group full-width">
                        <label>Description</label>
                        <textarea id="itemDesc" placeholder="Describe the item's features..." required></textarea>
                    </div>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Add Item to Store</button>
            </form>
        </div>
    </div>

    <div id="notification-toast" class="toast-left"></div>
</body>
</html>
